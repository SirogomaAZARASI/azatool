<script>
const code = document.getElementById("code");
const preview = document.getElementById("preview");
const fullscreenBtn = document.getElementById("fullscreenBtn");
const right = document.getElementById("right");
const left = document.getElementById("left");

function run() {
  const doc = preview.contentDocument;
  doc.open();
  doc.write(code.value);
  doc.close();

  // タイトル強制（SEOブレ防止）
  doc.title = "HTML実行ツール | AZAtool";
}

code.addEventListener("input", run);
run();

let isFull = false;

fullscreenBtn.onclick = () => {
  isFull = !isFull;

  if (isFull) {
    right.classList.add("fullscreen");
    left.style.display = "none";
    fullscreenBtn.textContent = "戻る";
  } else {
    right.classList.remove("fullscreen");
    left.style.display = "flex";
    fullscreenBtn.textContent = "全画面";
  }
};

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && isFull) {
    fullscreenBtn.click();
  }
});

const divider = document.getElementById("divider");
let isDragging = false;

divider.addEventListener("mousedown", () => {
  isDragging = true;
});

document.addEventListener("mouseup", () => {
  isDragging = false;
});

document.addEventListener("mousemove", (e) => {
  if (!isDragging) return;
  const percent = (e.clientX / window.innerWidth) * 100;
  left.style.width = percent + "%";
  right.style.width = (100 - percent) + "%";
});
</script>
