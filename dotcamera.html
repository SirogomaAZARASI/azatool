<style>
body {
  margin:0;
  font-family:system-ui,-apple-system,sans-serif;
  background:#0f1115;
  color:#e6e6eb;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

header {
  padding:8px;
  text-align:center;
}

h1 {
  font-size:16px;
  margin:6px 0;
}

.panel {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  justify-content:center;
  padding:8px;
  background:#0f1115;
  position:sticky;
  top:0;
  z-index:10;
}

.panel>* {
  background:#171a21;
  border:1px solid #2a2f3a;
  color:#e6e6eb;
  border-radius:8px;
  padding:6px 10px;
  font-size:14px;
}

.stage {
  width:100vw;
  height:100vh;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  flex:1;
}

canvas {
  width:100vw;
  height:100vh;
  object-fit:contain;
  image-rendering:pixelated;
  display:block;
}

video {
  display:none;
}

.palette-editor {
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  justify-content:center;
  padding:6px;
}

.swatch {
  display:flex;
  align-items:center;
  gap:4px;
  background:#111;
  border:1px solid #2a2f3a;
  border-radius:999px;
  padding:4px 6px;
}

.swatch input[type="color"] {
  width:28px;
  height:28px;
  border:none;
  background:none;
}

.hidden {
  display:none!important;
}

.palette-io {
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  justify-content:center;
}

.palette-io textarea {
  width:240px;
  height:42px;
  background:#0b0d12;
  color:#cfd3ff;
  border:1px solid #2a2f3a;
  border-radius:6px;
  padding:6px;
  font-size:12px;
}

footer {
  text-align:center;
  font-size:12px;
  color:#777;
  padding:10px 0 14px;
}

.convert-wrap {
  display:flex;
  justify-content:center;
  gap:16px;
  margin:16px 0;
}

.convert-btn {
  width:110px;
  height:110px;
  border-radius:50%;
  background:#ff3b3b;
  color:white;
  font-size:16px;
  font-weight:bold;
  border:none;
  cursor:pointer;
  box-shadow:0 6px 20px rgba(255,59,59,0.5);
  transition:all .2s ease;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:6px;
}

.realtime-btn {
  background:#3b82ff;
  box-shadow:0 6px 20px rgba(59,130,255,0.5);
}

.convert-btn:active {
  transform:scale(.95);
}

.play-icon {
  width:0;
  height:0;
  border-left:22px solid white;
  border-top:14px solid transparent;
  border-bottom:14px solid transparent;
  margin-left:4px;
}

.pause-icon {
  position:relative;
  width:22px;
  height:26px;
}

.pause-icon::before,
.pause-icon::after {
  content:"";
  position:absolute;
  top:0;
  width:6px;
  height:100%;
  background:white;
}

.pause-icon::before { left:0; }
.pause-icon::after { right:0; }

.btn-text {
  font-size:12px;
}
</style>
</head>

<body>

<header>
<h1>DotCameraとは</h1>

<p>
画像をレトロなドット絵に変換できる無料ツールです。
色の数やドットの粗さを調整して、ピクセルアート風の画像を簡単に作成できます。
スマホ・PCのブラウザで動作します。
</p>

<a href="dotcamerahint.html">詳しい使い方</a><br>
<a href="dotcamerasample.html">作例を見る</a>
</header>


<div class="panel">

<input type="file" id="file" accept="image/*">

<label>
ドット数
<input id="dotSize" type="number" value="100" min="4" max="1024">
</label>

<label>
色数
<input id="colorCount" type="number" value="8" min="1">
</label>

<select id="mode">
<option value="preset">プリセット</option>
<option value="random">ランダム</option>
<option value="custom">手動</option>
</select>

<select id="preset">
<option value="sunset2">サンセット</option>
<option value="mono8">モノクロ</option>
<option value="gb8">古いゲーム風</option>
<option value="dusty5">くすみカラー</option>
<option value="vivid5">ビビッド</option>
<option value="pop5">ポップ</option>
</select>

<button id="switchCam">フロント/リア切替</button>
<button id="save">保存</button>

<button id="saveColors">色保存</button>
<select id="savedPalettes"></select>

<button id="savePalette">パレット保存</button>
<button id="deletePalette">削除</button>

</div>


<div class="palette-io">
<textarea id="paletteText"></textarea>
<button id="loadColors">色読み込み</button>
</div>


<div class="convert-wrap">

<button id="convert" class="convert-btn">
変換
</button>

<button id="realtime" class="convert-btn realtime-btn">
<span class="play-icon"></span>
<div class="btn-text">リアルタイム</div>
</button>

</div>


<div id="paletteEditor" class="palette-editor"></div>


<div class="stage">
<canvas id="canvas"></canvas>
<video id="video" playsinline></video>
</div>


<footer>
Copyright © 2026 SirogomaAZARASI All rights reserved.
</footer>

</body>
</html>
