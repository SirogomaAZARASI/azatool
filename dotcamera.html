<body>
<header>
<h1>DotCameraとは</h1>
<p>画像をレトロなドット絵に変換できる無料ツールです。色の数やドットの粗さを調整して、ピクセルアート風の画像を簡単に作成できます。スマホ・PCのブラウザで動作します。</p>
<a href="dotcamerahint.html" style="color:#8ab4ff;">詳しい使い方</a><br>
<a href="dotcamerasample.html" style="color:#8ab4ff;">作例を見る</a>
</header>

<div class="panel">
<input type="file" id="file" accept="image/*">
<label>ドット数 <input id="dotSize" type="number" value="100" min="4" max="1024"></label>
<label>色数 <input id="colorCount" type="number" value="8" min="1"></label>
<select id="mode">
<option value="preset">プリセット</option>
<option value="random">ランダム</option>
<option value="custom">手動</option>
</select>
<select id="preset">
<option value="sunset2">サンセット</option>
<option value="mono8">モノクロ</option>
<option value="gb8">古いゲーム風</option>
<option value="dusty5">くすみカラー</option>
<option value="vivid5">ビビッド</option>
<option value="pop5">ポップ</option>
</select>
<button id="switchCam">フロント/リア切替</button>
<button id="save">保存</button>
<button id="saveColors">色保存</button>
<select id="savedPalettes"></select>
<button id="savePalette">パレット保存</button>
<button id="deletePalette">削除</button>
</div>

<div class="palette-io">
<textarea id="paletteText" placeholder="例: 255.000.000,000.000.255,000.255.000,128.128.128"></textarea>
<button id="loadColors">色読み込み</button>
</div>

<div class="convert-wrap">
<button id="convert" class="convert-btn"><div>変換</div></button>
<button id="realtime" class="convert-btn realtime-btn">
  <span class="play-icon"></span>
  <div class="btn-text">リアルタイム</div>
</button>
</div>

<div id="paletteEditor" class="palette-editor"></div>

<div class="stage">
<canvas id="canvas"></canvas>
<video id="video" playsinline></video>
</div>

<div style="text-align:center;">
<a href="index.html" style="color:#8ab4ff;">←ツール一覧に戻る</a><br>>
</div>

  <a href="index.html">← ツール一覧に戻る</a><br>

</div>

<script>
const PRESETS={sunset2:[[44,62,76],[66,75,82],[109,102,94],[163,132,104],[189,141,101],[211,158,108],[255,192,118],[204,206,185]],mono8:[[0,0,0],[64,64,64],[128,128,128],[192,192,192],[255,255,255]],gb8:[[15,56,15],[48,98,48],[139,172,15],[155,188,15],[220,240,140],[255,255,255]],dusty5:[[37,40,61],[111,146,131],[166,117,161],[206,162,172],[239,217,206]],vivid5:[[41,47,54],[78,205,196],[252,171,16],[255,107,107],[255,255,255]],pop5:[[29,47,111],[131,144,250],[250,199,72],[249,233,236],[36,130,50]]};
const fileInput=document.getElementById('file');
const dotSizeInput=document.getElementById('dotSize');
const colorCountInput=document.getElementById('colorCount');
const modeSelect=document.getElementById('mode');
const presetSelect=document.getElementById('preset');
const paletteEditor=document.getElementById('paletteEditor');
const convertBtn=document.getElementById('convert');
const realtimeBtn=document.getElementById('realtime');
const switchCamBtn=document.getElementById('switchCam');
const saveBtn=document.getElementById('save');
const saveColorsBtn=document.getElementById('saveColors');
const loadColorsBtn=document.getElementById('loadColors');
const paletteText=document.getElementById('paletteText');
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d',{willReadFrequently:true});
ctx.imageSmoothingEnabled=false;
const video=document.getElementById('video');
let img=new Image();
let stream=null;
let useFront=false;
let realtimeOn=false;
let rafId=null;
let customPalette=[];
let fixedRandomPalette=null;
let lastDrawSize=[0,0];
function hexToRgb(hex){const n=parseInt(hex.replace('#',''),16);return[(n>>16)&255,(n>>8)&255,n&255];}
function rgbToHex(r,g,b){return'#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');}
function randomPalette(n){return Array.from({length:n},()=>[Math.random()*255|0,Math.random()*255|0,Math.random()*255|0]);}
function buildPaletteEditorFromRGB(pal){paletteEditor.innerHTML='';customPalette=[];pal.forEach(rgb=>{const w=document.createElement('div');w.className='swatch';const c=document.createElement('input');c.type='color';c.value=rgbToHex(rgb[0],rgb[1],rgb[2]);c.oninput=drawFromImage;w.appendChild(c);paletteEditor.appendChild(w);customPalette.push(c);});}
function buildPaletteEditor(n){paletteEditor.innerHTML='';customPalette=[];for(let i=0;i<n;i++){const w=document.createElement('div');w.className='swatch';const c=document.createElement('input');c.type='color';c.value='#'+Math.floor(Math.random()*0xffffff).toString(16).padStart(6,'0');c.oninput=drawFromImage;w.appendChild(c);paletteEditor.appendChild(w);customPalette.push(c);}}
function getActivePalette(){const n=parseInt(colorCountInput.value,10);const mode=modeSelect.value;if(mode==='preset')return PRESETS[presetSelect.value];if(mode==='random'){if(!fixedRandomPalette||fixedRandomPalette.length!==n){fixedRandomPalette=randomPalette(n);}return fixedRandomPalette;}return customPalette.map(i=>hexToRgb(i.value));}
function fitSize(sw,sh,d){const a=sw/sh;return sw>=sh?[d,Math.max(1,Math.round(d/a))]:[Math.max(1,Math.round(d*a)),d];}
function quantize(imgData,pal){const d=imgData.data;for(let i=0;i<d.length;i+=4){let r=d[i],g=d[i+1],b=d[i+2],best=pal[0],min=1e9;for(const p of pal){const dr=r-p[0],dg=g-p[1],db=b-p[2];const dist=dr*dr+dg*dg+db*db;if(dist<min){min=dist;best=p;}}d[i]=best[0];d[i+1]=best[1];d[i+2]=best[2];}}
function drawFromImage(){if(!img.src)return;const[w,h]=fitSize(img.width,img.height,parseInt(dotSizeInput.value,10));canvas.width=w;canvas.height=h;ctx.drawImage(img,0,0,w,h);const id=ctx.getImageData(0,0,w,h);quantize(id,getActivePalette());ctx.putImageData(id,0,0);lastDrawSize=[w,h];}
fileInput.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{img.onload=drawFromImage;img.src=r.result;};r.readAsDataURL(f);};
convertBtn.onclick=()=>{if(modeSelect.value==='random'){fixedRandomPalette=randomPalette(parseInt(colorCountInput.value,10));}drawFromImage();};
function updatePaletteUI(){paletteEditor.classList.toggle('hidden',modeSelect.value!=='custom');if(modeSelect.value==='custom'){const n=parseInt(colorCountInput.value,10);if(customPalette.length!==n)buildPaletteEditor(n);}}
modeSelect.onchange=updatePaletteUI;
colorCountInput.onchange=updatePaletteUI;
updatePaletteUI();
loadColorsBtn.onclick=()=>{const text=paletteText.value.trim();if(!text)return alert('色コードを入力してください');try{const parts=text.split(',').map(s=>{const[r,g,b]=s.split('.').map(v=>parseInt(v,10));if([r,g,b].some(v=>isNaN(v)||v<0||v>255))throw new Error();return[r,g,b];});colorCountInput.value=parts.length;modeSelect.value='custom';fixedRandomPalette=null;buildPaletteEditorFromRGB(parts);drawFromImage();}catch(e){alert('形式が正しくありません');}};
saveColorsBtn.onclick=async()=>{const pal=getActivePalette();const text=pal.map(p=>`${String(p[0]).padStart(3,'0')}.${String(p[1]).padStart(3,'0')}.${String(p[2]).padStart(3,'0')}`).join(',');try{await navigator.clipboard.writeText(text);alert('コピーしました');}catch{alert('コピーできませんでした');}};
async function startCamera(){if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:useFront?'user':'environment'},audio:false});video.srcObject=stream;await video.play();}
function drawFromVideo(){if(!realtimeOn)return;const[w,h]=fitSize(video.videoWidth||640,video.videoHeight||480,parseInt(dotSizeInput.value,10));canvas.width=w;canvas.height=h;ctx.drawImage(video,0,0,w,h);const id=ctx.getImageData(0,0,w,h);quantize(id,getActivePalette());ctx.putImageData(id,0,0);lastDrawSize=[w,h];rafId=requestAnimationFrame(drawFromVideo);}
realtimeBtn.onclick=async()=>{realtimeOn=!realtimeOn;realtimeBtn.innerHTML=realtimeOn?'<span class="pause-icon"></span><div class="btn-text">リアルタイム</div>':'<span class="play-icon"></span><div class="btn-text">リアルタイム</div>';if(realtimeOn){await startCamera();drawFromVideo();}else{if(rafId)cancelAnimationFrame(rafId);if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}}};
switchCamBtn.onclick=async()=>{useFront=!useFront;if(realtimeOn)await startCamera();};
saveBtn.onclick=()=>{if(!lastDrawSize[0])return;const scale=12;const out=document.createElement('canvas');out.width=lastDrawSize[0]*scale;out.height=lastDrawSize[1]*scale;const octx=out.getContext('2d');octx.imageSmoothingEnabled=false;octx.drawImage(canvas,0,0,out.width,out.height);const a=document.createElement('a');a.href=out.toDataURL('image/png');a.download='retro.png';a.click();};
const savedSelect=document.getElementById('savedPalettes');
const savePaletteBtn=document.getElementById('savePalette');
const deletePaletteBtn=document.getElementById('deletePalette');
function getSavedPalettes(){return JSON.parse(localStorage.getItem('palettes')||'[]');}
function setSavedPalettes(arr){localStorage.setItem('palettes',JSON.stringify(arr));}
function updateSavedUI(){const list=getSavedPalettes();savedSelect.innerHTML='<option value="">保存済みパレット</option>';list.forEach((p,i)=>{const opt=document.createElement('option');opt.value=i;opt.textContent=p.name||`Palette ${i+1}`;savedSelect.appendChild(opt);});}
savePaletteBtn.onclick=()=>{const pal=getActivePalette();if(!pal.length)return;const name=prompt('パレット名を入力');if(!name)return;let list=getSavedPalettes();list.push({name,colors:pal});if(list.length>50)list.shift();setSavedPalettes(list);updateSavedUI();};
savedSelect.onchange=()=>{const i=savedSelect.value;if(i==="")return;const data=getSavedPalettes()[i];const pal=data.colors||data;colorCountInput.value=pal.length;modeSelect.value='custom';fixedRandomPalette=null;buildPaletteEditorFromRGB(pal);drawFromImage();};
deletePaletteBtn.onclick=()=>{const i=savedSelect.value;if(i==="")return;let list=getSavedPalettes();list.splice(i,1);setSavedPalettes(list);updateSavedUI();};
updateSavedUI();
</script>
</body>
</html>
