<style>
body{
  margin:0;
  font-family:system-ui,-apple-system,sans-serif;
  background:#0f1115;
  color:#e6e6eb;
  padding-bottom:80px;
}
.wrap{max-width:980px;margin:auto;padding:16px}
h1{font-size:1.2rem;margin:0 0 12px}

.panel{
  background:#171a21;
  border-radius:10px;
  padding:12px;
  margin-bottom:12px
}

.row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
label{font-size:12px;opacity:.9}

input,select,button,textarea{
  background:#0f1115;
  color:#e6e6eb;
  border:1px solid #2a2f3a;
  border-radius:6px;
  padding:6px 8px
}

button{cursor:pointer}

.palette{display:flex;flex-wrap:wrap;gap:8px}

.swatch{
  display:flex;
  align-items:center;
  gap:6px;
  background:#0f1115;
  border-radius:6px;
  padding:6px
}

.box{
  width:20px;
  height:20px;
  border-radius:4px;
  border:1px solid #2a2f3a
}

canvas{
  max-width:100%;
  border-radius:8px;
  border:1px solid #2a2f3a
}

textarea{width:100%;min-height:70px}

  position:fixed;
  bottom:10px;

  transform:translateX(-50%);
  width:90%;

  backdrop-filter:blur(10px);

  text-align:center;

  border:1px solid rgba(255,255,255,0.15);
  box-shadow:0 5px 20px rgba(0,0,0,0.3);
  z-index:999;

.footer a{
  color:#66ccff;
  text-decoration:none;
  font-weight:600;
}

.footer a:hover{
  text-decoration:underline;
}

.footer .copyright{
  font-size:13px;
  font-weight:500;
  background:linear-gradient(90deg,#ffffff,#bbbbbb);
  background-clip:text;
  -webkit-background-clip:text;
  color:transparent;

  letter-spacing:0.3px;

<body>
<div class="wrap">
  <h1>ColorPaletteGenerator</h1>

  <div class="panel row">
    <label>画像 <input type="file" id="file" accept="image/*"></label>

    <label>モード
      <select id="mode">
        <option value="pick">スポイト</option>
        <option value="extract">画像から抽出</option>
        <option value="base">２つの色の中間色を生成</option>
        <option value="manual">手動入力</option>
      </select>
    </label>

    <label>表示形式
      <select id="format">
        <option value="dot">RGB(DotCamera)</option>
        <option value="hex">16進</option>
      </select>
    </label>

    <button id="copy">コピー</button>
    <button id="reset">色リセット</button>
    <button id="randomAdd">ランダム追加</button>
  </div>

  <div class="panel row" id="extractUI">
    <label>抽出数 <input id="extractCount" type="number" min="1" value="8"></label>
    <button id="extractBtn">抽出</button>
  </div>

  <div class="panel row" id="baseUI" style="display:none">
    <label>ベース色1<input type="color" id="base1" value="#ff0000"></label>
    <label>ベース色2<input type="color" id="base2"></label>
    <label>生成数 <input id="baseCount" type="number" min="1" value="8"></label>
    <button id="baseBtn">生成</button>
  </div>

  <div class="panel row" id="manualUI" style="display:none">
    <textarea id="manualText" placeholder="000.000.255,#00ff00 など"></textarea>
    <button id="manualLoad">読み込み</button>
  </div>

  <div class="panel">
    <canvas id="cv"></canvas>
  </div>

  <div class="panel">
    <div style="font-size:12px; opacity:.7; margin-bottom:6px; text-align:center;">
      ※ 色をダブルタップで削除
    </div>
    <div class="palette" id="palette"></div>
  </div>
</div>

<!-- フッター -->
<div class="footer">
  <a href="index.html">← ツール一覧に戻る</a><br>
  <div class="copyright">
    Copyright © 2026 SirogomaAZARASI All Rights Reserved.
  </div>
</div>

<script>
const file = document.getElementById("file");
const modeSel = document.getElementById("mode");
const fmtSel = document.getElementById("format");
const paletteEl = document.getElementById("palette");
const copyBtn = document.getElementById("copy");
const resetBtn = document.getElementById("reset");
const randomAddBtn = document.getElementById("randomAdd");

const cv = document.getElementById("cv");
const ctx = cv.getContext("2d");

const extractUI = document.getElementById("extractUI");
const baseUI = document.getElementById("baseUI");
const manualUI = document.getElementById("manualUI");

const extractBtn = document.getElementById("extractBtn");
const extractCount = document.getElementById("extractCount");

const base1 = document.getElementById("base1");
const base2 = document.getElementById("base2");
const baseCount = document.getElementById("baseCount");
const baseBtn = document.getElementById("baseBtn");

const manualText = document.getElementById("manualText");
const manualLoad = document.getElementById("manualLoad");

let paletteColors = [];
let format = "dot";
let mode = "pick";

modeSel.onchange = ()=>{
  mode = modeSel.value;
  extractUI.style.display = mode==="extract" ? "flex" : "none";
  baseUI.style.display = mode==="base" ? "flex" : "none";
  manualUI.style.display = mode==="manual" ? "flex" : "none";
};

fmtSel.onchange = ()=>{
  format = fmtSel.value;
  renderPalette();
};

file.onchange = e=>{
  const img = new Image();
  img.onload = ()=>{
    cv.width = img.width;
    cv.height = img.height;
    ctx.drawImage(img,0,0);
  };
  img.src = URL.createObjectURL(e.target.files[0]);
};

cv.onclick = e=>{
  if(mode!=="pick") return;
  const r = cv.getBoundingClientRect();
  const x = Math.floor((e.clientX - r.left) * cv.width / r.width);
  const y = Math.floor((e.clientY - r.top) * cv.height / r.height);
  const d = ctx.getImageData(x,y,1,1).data;
  paletteColors.push({r:d[0], g:d[1], b:d[2]});
  renderPalette();
};

extractBtn.onclick = ()=>{
  const n = parseInt(extractCount.value,10);
  const id = ctx.getImageData(0,0,cv.width,cv.height).data;
  const map = new Map();

  for(let i=0;i<id.length;i+=4){
    const r=id[i]&0xF0, g=id[i+1]&0xF0, b=id[i+2]&0xF0;
    const k = r+","+g+","+b;
    map.set(k,(map.get(k)||0)+1);
  }

  paletteColors = [...map.entries()]
    .sort((a,b)=>b[1]-a[1])
    .slice(0,n)
    .map(v=>{
      const [r,g,b]=v[0].split(",").map(Number);
      return {r,g,b};
    });

  renderPalette();
};

baseBtn.onclick = ()=>{
  const c1 = hexToRgb(base1.value);
  const c2 = base2.value ? hexToRgb(base2.value) : c1;
  const n = parseInt(baseCount.value,10);

  paletteColors = [];

  for(let i=0;i<n;i++){
    const t = n===1 ? 0 : i/(n-1);
    paletteColors.push({
      r:Math.round(c1[0]+(c2[0]-c1[0])*t),
      g:Math.round(c1[1]+(c2[1]-c1[1])*t),
      b:Math.round(c1[2]+(c2[2]-c1[2])*t),
    });
  }

  renderPalette();
};

manualLoad.onclick = ()=>{
  paletteColors = manualText.value.split(/[,\n]/).map(s=>{
    s=s.trim();
    if(!s) return null;

    if(s.startsWith("#")){
      const [r,g,b]=hexToRgb(s);
      return {r,g,b};
    }else{
      const [r,g,b]=s.split(".").map(Number);
      return {r,g,b};
    }
  }).filter(Boolean);

  renderPalette();
};

copyBtn.onclick = ()=>{
  const txt = paletteColors.map(c=>{
    return format==="dot"
      ? rgbToDot(c.r,c.g,c.b)
      : rgbToHex(c.r,c.g,c.b);
  }).join(",");

  navigator.clipboard.writeText(txt);
};

resetBtn.onclick = ()=>{
  paletteColors = [];
  renderPalette();
};

randomAddBtn.onclick = ()=>{
  paletteColors.push({
    r:Math.floor(Math.random()*256),
    g:Math.floor(Math.random()*256),
    b:Math.floor(Math.random()*256)
  });
  renderPalette();
};

function renderPalette(){
  paletteEl.innerHTML="";

  paletteColors.forEach((c,index)=>{
    const sw = document.createElement("div");
    sw.className="swatch";

    const box = document.createElement("div");
    box.className="box";
    box.style.background=`rgb(${c.r},${c.g},${c.b})`;

    const txt = document.createElement("span");
    txt.textContent = format==="dot"
      ? rgbToDot(c.r,c.g,c.b)
      : rgbToHex(c.r,c.g,c.b);

    sw.ondblclick = ()=>{
      paletteColors.splice(index,1);
      renderPalette();
    };

    sw.appendChild(box);
    sw.appendChild(txt);
    paletteEl.appendChild(sw);
  });
}

function rgbToDot(r,g,b){
  return String(r).padStart(3,"0")+"."+String(g).padStart(3,"0")+"."+String(b).padStart(3,"0");
}

function rgbToHex(r,g,b){
  return "#"+[r,g,b].map(v=>v.toString(16).padStart(2,"0")).join("").toUpperCase();
}

function hexToRgb(hex){
  hex = hex.replace("#","");
  return [
    parseInt(hex.slice(0,2),16),
    parseInt(hex.slice(2,4),16),
    parseInt(hex.slice(4,6),16),
  ];
}
</script>
</body>
