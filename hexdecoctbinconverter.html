<body>

<div class="container">

  <div class="top">
    <div class="left">
      <h2>変換元</h2>

      <select id="base" onchange="update(); updateButtons();">
        <option value="16">HEX</option>
        <option value="10">DEC</option>
        <option value="8">OCT</option>
        <option value="2">BIN</option>
      </select>

      <br>
      <input id="input" placeholder="1A" oninput="update()">
    </div>

    <div class="right">
      <h2>変換先</h2>
      <div class="result">
        <p><b>HEX</b><span id="hex"></span><button class="copy-btn" onclick="copy(this,'HEX','hex')">コピー</button></p>
        <p><b>DEC</b><span id="dec"></span><button class="copy-btn" onclick="copy(this,'DEC','dec')">コピー</button></p>
        <p><b>OCT</b><span id="oct"></span><button class="copy-btn" onclick="copy(this,'OCT','oct')">コピー</button></p>
        <p><b>BIN</b><span id="bin"></span><button class="copy-btn" onclick="copy(this,'BIN','bin')">コピー</button></p>
      </div>
    </div>
  </div>

  <div class="bottom">
    <div id="pad">
      <button data-val="1">1</button>
      <button data-val="2">2</button>
      <button data-val="3">3</button>
      <button data-val="4">4</button>

      <button data-val="5">5</button>
      <button data-val="6">6</button>
      <button data-val="7">7</button>
      <button data-val="8">8</button>

      <button data-val="9">9</button>
      <button data-val="0">0</button>
      <button data-val="A">A</button>
      <button data-val="B">B</button>

      <button data-val="C">C</button>
      <button data-val="D">D</button>
      <button data-val="E">E</button>
      <button data-val="F">F</button>

      <button onclick="clearInput()">⌫</button>
    </div>

<div class="footer">
  <a href="index.html">← ツール一覧に戻る</a><br>

  </div>

<script>
const buttons = document.querySelectorAll("#pad button[data-val]");

buttons.forEach(btn => {
  btn.onclick = () => {
    if (!btn.classList.contains("hidden")) {
      add(btn.dataset.val);
    }
  };
});

function formatBin(binStr) {
  let pad = (4 - (binStr.length % 4)) % 4;
  binStr = "0".repeat(pad) + binStr;
  return binStr.replace(/(.{4})/g, "$1 ").trim();
}

function update() {
  let value = document.getElementById("input").value.trim();
  let base = parseInt(document.getElementById("base").value);

  if (value === "") return clearOutput();

  let num = parseInt(value, base);
  if (isNaN(num)) return clearOutput();

  document.getElementById("hex").textContent = num.toString(16).toUpperCase();
  document.getElementById("dec").textContent = num.toString(10);
  document.getElementById("oct").textContent = num.toString(8);
  document.getElementById("bin").textContent = formatBin(num.toString(2));
}

function add(val) {
  document.getElementById("input").value += val;
  update();
}

function clearInput() {
  let input = document.getElementById("input");
  input.value = input.value.slice(0, -1);
  update();
}

function clearOutput() {
  document.getElementById("hex").textContent = "";
  document.getElementById("dec").textContent = "";
  document.getElementById("oct").textContent = "";
  document.getElementById("bin").textContent = "";
}

function copy(btn, label, id) {
  let text = document.getElementById(id).textContent.replace(/ /g, "");
  if (!text) return;

  navigator.clipboard.writeText(text);

  let original = btn.textContent;
  btn.textContent = "copied";
  setTimeout(() => btn.textContent = original, 1000);

  if (navigator.vibrate) {
    navigator.vibrate(50);
  }

  let toast = document.getElementById("toast");
  toast.textContent = label + " をコピーしました";
  toast.classList.add("show");

  setTimeout(() => {
    toast.classList.remove("show");
  }, 1500);
}

function updateButtons() {
  let base = parseInt(document.getElementById("base").value);

  buttons.forEach(btn => {
    let val = btn.dataset.val;

    let allowed =
      (base === 2 && /^[01]$/.test(val)) ||
      (base === 8 && /^[0-7]$/.test(val)) ||
      (base === 10 && /^[0-9]$/.test(val)) ||
      (base === 16 && /^[0-9A-F]$/.test(val));

    btn.classList.toggle("hidden", !allowed);

    if (base === 16 && /^[A-F]$/.test(val)) {
      btn.classList.add("hex-key");
    } else {
      btn.classList.remove("hex-key");
    }
  });
}

updateButtons();
</script>
